<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon (border/stroke) -->
  <polygon
    points="60,5 110,30 110,90 60,115 10,90 10,30"
    fill="url(#hexFill)"
    stroke="url(#hexStroke)"
    stroke-width="3"
  />

  <!-- Inner hexagon accent -->
  <polygon
    points="60,15 102,36 102,84 60,105 18,84 18,36"
    fill="none"
    stroke="#2a2a2a"
    stroke-width="1.5"
  />

  <!-- Left bracket < -->
  <polyline
    points="52,38 32,60 52,82"
    fill="none"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right bracket > -->
  <polyline
    points="68,38 88,60 68,82"
    fill="none"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Forward slash / -->
  <line
    x1="66" y1="34"
    x2="54" y2="86"
    stroke="url(#hexStroke)"
    stroke-width="5"
    stroke-linecap="round"
  />
</svg>
